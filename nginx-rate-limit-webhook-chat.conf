# Rate limiting recommandé pour le webhook public.
# Ajustez proxy_pass selon votre configuration Nginx (par ex. vers votre instance n8n).

limit_req_zone $binary_remote_addr zone=chafafiya_webhook:10m rate=10r/m;

location /webhook/chat {
  limit_req zone=chafafiya_webhook burst=5 nodelay;
  limit_req_status 429;

  # Si vous avez un reverse proxy vers n8n, gardez vos directives existantes.
  # Exemple (à adapter) :
  # proxy_pass http://localhost:5678;
}

